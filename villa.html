<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Villa — Sundara Investment Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0B0B0B;
      color: #F5F5F5;
      font-family: 'Outfit', sans-serif;
      cursor: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      background: #C6A96B;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.25s, height 0.25s, opacity 0.25s;
    }
    #cursor.expand {
      width: 28px;
      height: 28px;
      opacity: 0.35;
    }

    .r-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px clamp(24px, 5vw, 64px);
      background: rgba(11, 11, 11, 0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(198, 169, 107, 0.1);
      z-index: 100;
    }

    .r-nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(14px, 2vw, 18px);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-decoration: none;
      color: #F5F5F5;
      font-weight: 400;
    }
    .r-nav-logo span { color: #C6A96B; }

    .r-nav-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .r-nav-back {
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      transition: color 0.25s;
    }
    .r-nav-back:hover { color: #C6A96B; }

    @media (max-width: 768px) {
      .cur-switch { display: none !important; }
      .r-nav-back { display: none; }
    }

    /* lang visibility */
    body:not(.fr) .lang-fr-inline { display: none; }
    body.fr .lang-en-inline { display: none; }

    /* ── LOADING ───────────────────────────── */
    #v-loading {
      position: fixed;
      inset: 0;
      background: #0B0B0B;
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s;
    }
    #v-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: #C6A96B;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }

    /* ── GALLERY ───────────────────────────── */
    .v-gallery { padding-top: 72px; }

    .v-main-wrap {
      position: relative;
      height: calc(100vh - 72px);
      overflow: hidden;
    }
    .v-main-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.4s;
    }

    .v-gallery-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(11, 11, 11, 0.75) 0%, transparent 50%);
      pointer-events: none;
    }

    .v-gallery-meta {
      position: absolute;
      bottom: 36px;
      left: clamp(24px, 5vw, 64px);
      pointer-events: none;
    }

    .v-gallery-badge {
      display: inline-block;
      margin-bottom: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 5px 12px;
      background: rgba(198, 169, 107, 0.15);
      border: 1px solid rgba(198, 169, 107, 0.4);
      color: #C6A96B;
      backdrop-filter: blur(8px);
    }

    .v-gallery-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 4vw, 52px);
      font-weight: 300;
      color: #F5F5F5;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .v-gallery-location {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(245, 245, 245, 0.55);
      margin-top: 6px;
    }

    .v-thumbs {
      display: flex;
      gap: 6px;
      padding: 8px clamp(24px, 5vw, 64px);
      background: #0d0d0d;
      overflow-x: auto;
    }

    .v-thumb {
      flex-shrink: 0;
      width: 100px;
      height: 64px;
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.25s;
    }
    .v-thumb.active { border-color: #C6A96B; }
    .v-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── DETAIL ────────────────────────────── */
    .v-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      padding: 64px clamp(24px, 7vw, 96px) 80px;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 900px) {
      .v-detail { grid-template-columns: 1fr; }
    }

    .v-price-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(198, 169, 107, 0.6);
      margin-bottom: 6px;
    }

    .v-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 4vw, 52px);
      font-weight: 300;
      color: #C6A96B;
      line-height: 1;
      margin-bottom: 32px;
      transition: opacity 0.25s, transform 0.25s;
    }
    .v-price.updating {
      opacity: 0;
      transform: scale(0.96);
    }

    .v-specs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 36px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .v-spec-label {
      font-size: 8px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(245, 245, 245, 0.3);
      margin-bottom: 4px;
    }

    .v-spec-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      color: #F5F5F5;
    }

    .v-section-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(198, 169, 107, 0.6);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .v-section-label::before {
      content: '';
      width: 16px;
      height: 1px;
      background: currentColor;
      flex-shrink: 0;
    }

    .v-description {
      font-size: 14px;
      font-weight: 300;
      color: rgba(245, 245, 245, 0.6);
      line-height: 1.9;
      margin-bottom: 36px;
    }

    .v-features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 24px;
      margin-bottom: 40px;
    }

    .v-feature {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 12px;
      font-weight: 300;
      color: rgba(245, 245, 245, 0.5);
      letter-spacing: 0.04em;
      line-height: 1.5;
    }
    .v-feature::before {
      content: '';
      width: 4px;
      height: 4px;
      background: #C6A96B;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }

    .v-cta-btn {
      display: block;
      text-align: center;
      padding: 17px 32px;
      background: #C6A96B;
      color: #0B0B0B;
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      transition: background 0.3s, transform 0.3s;
    }
    .v-cta-btn:hover {
      background: #d4b87a;
      transform: translateY(-2px);
    }

    .v-map-wrap {
      position: sticky;
      top: 100px;
      height: fit-content;
    }

    .v-map-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(198, 169, 107, 0.6);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .v-map-label::before {
      content: '';
      width: 16px;
      height: 1px;
      background: currentColor;
      flex-shrink: 0;
    }

    .v-map-iframe {
      width: 100%;
      height: 400px;
      border: 1px solid rgba(198, 169, 107, 0.2);
      display: block;
      margin-bottom: 24px;
    }

    .v-back {
      display: block;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(245, 245, 245, 0.35);
      text-decoration: none;
      transition: color 0.25s;
      padding: 0 clamp(24px, 7vw, 96px) 64px;
    }
    .v-back:hover { color: #C6A96B; }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .cur-switch {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cur-btn {
      background: none;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      padding: 2px 0;
      transition: color 0.25s;
    }
    .cur-btn:hover { color: rgba(198, 169, 107, 0.7); }
    .cur-btn.active { color: #C6A96B; }

    .cur-sep {
      color: rgba(255, 255, 255, 0.15);
      font-size: 9px;
    }
  </style>
</head>
<body>

<div id="cursor"></div>

<div id="v-loading">
  <span class="loading-text">SUNDARA</span>
</div>

<header class="r-nav">
  <a href="index.html" class="r-nav-logo">SUNDARA <span>·</span> Investment Group</a>
  <div class="r-nav-right">
    <div class="cur-switch">
      <button class="cur-btn" data-cur="USD" onclick="setCurrency('USD')">USD</button>
      <span class="cur-sep">/</span>
      <button class="cur-btn" data-cur="EUR" onclick="setCurrency('EUR')">EUR</button>
      <span class="cur-sep">/</span>
      <button class="cur-btn" data-cur="GBP" onclick="setCurrency('GBP')">GBP</button>
      <span class="cur-sep">/</span>
      <button class="cur-btn" data-cur="IDR" onclick="setCurrency('IDR')">IDR</button>
    </div>
    <a href="rentals.html" class="r-nav-back">
      <span class="lang-en-inline">← Rentals</span>
      <span class="lang-fr-inline">← Locations</span>
    </a>
  </div>
</header>

<div id="v-gallery-container" class="v-gallery"></div>

<div class="v-detail" id="v-detail">
  <div id="v-info"></div>
  <div id="v-map-col"></div>
</div>

<a href="rentals.html" class="v-back">
  <span class="lang-en-inline">← Back to all rentals</span>
  <span class="lang-fr-inline">← Retour aux locations</span>
</a>

<script src="js/lang.js"></script>
<script src="js/animations.js"></script>
<script>
const getLang = () => localStorage.getItem('sundara-lang') || 'en';

// ── CURRENCY (same system as rentals.html) ─────────────────
const FALLBACK_RATES = { USD: 0.000063, EUR: 0.000058, GBP: 0.000050 };
const RATES_KEY = 'sundara-rates';
const RATES_TTL = 43200000;
let rates = { ...FALLBACK_RATES };
let selectedCurrency = localStorage.getItem('sundara-currency') || 'USD';

async function initRates() {
  try {
    const cached = localStorage.getItem(RATES_KEY);
    if (cached) {
      const { ts, data } = JSON.parse(cached);
      if (Date.now() - ts < RATES_TTL) { rates = data; return; }
    }
    const res = await fetch('https://open.er-api.com/v6/latest/IDR');
    const json = await res.json();
    if (json.rates) {
      rates = { USD: json.rates.USD, EUR: json.rates.EUR, GBP: json.rates.GBP };
      localStorage.setItem(RATES_KEY, JSON.stringify({ ts: Date.now(), data: rates }));
    }
  } catch { rates = { ...FALLBACK_RATES }; }
}

function convertPrice(amountIDR, currency) {
  if (!amountIDR) return '—';
  if (currency === 'IDR') return 'IDR\u00a0' + amountIDR.toLocaleString('id-ID');
  const rate = (rates && rates[currency]) || FALLBACK_RATES[currency];
  const val = Math.round(amountIDR * rate);
  const sym = { USD: '$', EUR: '€', GBP: '£' }[currency];
  return sym + val.toLocaleString('en-US');
}

function setCurrency(c) {
  selectedCurrency = c;
  localStorage.setItem('sundara-currency', c);
  // update price element if present
  const priceEl = document.getElementById('v-price');
  if (priceEl) {
    const idr = parseInt(priceEl.dataset.priceIdr, 10);
    const suffix = priceEl.dataset.priceSuffix || '';
    priceEl.classList.add('updating');
    setTimeout(() => {
      priceEl.textContent = convertPrice(idr, selectedCurrency) + suffix;
      priceEl.classList.remove('updating');
    }, 150);
  }
  updateCurrencyButtons();
}

function updateCurrencyButtons() {
  document.querySelectorAll('.cur-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cur === selectedCurrency);
  });
}

// ── CURSOR ────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
if (cursor && window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('expand'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('expand'));
  });
} else if (cursor) {
  cursor.style.display = 'none';
  document.body.style.cursor = '';
}

// ── REVEAL ────────────────────────────────────────────────
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
}, { threshold: 0.08 });

// ── GALLERY ───────────────────────────────────────────────
function buildGallery(villa, lang) {
  const container = document.getElementById('v-gallery-container');
  const badge = villa.badge[lang];
  const name = villa.name[lang];
  const location = villa.location[lang];

  container.innerHTML = `
    <div class="v-main-wrap">
      <img id="mainImg" src="${villa.images[0]}" alt="${name}">
      <div class="v-gallery-overlay"></div>
      <div class="v-gallery-meta">
        <div class="v-gallery-badge">${badge}</div>
        <h1 class="v-gallery-name">${name}</h1>
        <p class="v-gallery-location">${location}</p>
      </div>
    </div>
    <div class="v-thumbs" id="thumbStrip"></div>`;

  const strip = document.getElementById('thumbStrip');
  villa.images.forEach((src, i) => {
    const div = document.createElement('div');
    div.className = 'v-thumb' + (i === 0 ? ' active' : '');
    div.innerHTML = `<img src="${src}" alt="${name} ${i+1}" loading="lazy">`;
    div.addEventListener('click', () => {
      document.getElementById('mainImg').src = src;
      document.querySelectorAll('.v-thumb').forEach(t => t.classList.remove('active'));
      div.classList.add('active');
    });
    strip.appendChild(div);
  });
}

// ── DETAIL ────────────────────────────────────────────────
function buildDetail(villa, id, lang) {
  const isNight = villa.type === 'short-term';
  const priceIdr = isNight ? villa.price_idr_night : villa.price_idr_month;
  const suffix = isNight
    ? (lang === 'fr' ? '\u00a0/ nuit' : '\u00a0/ night')
    : (lang === 'fr' ? '\u00a0/ mois' : '\u00a0/ month');
  const priceLabel = isNight
    ? (lang === 'fr' ? 'Tarif par nuit' : 'Rate per night')
    : (lang === 'fr' ? 'Tarif mensuel' : 'Monthly rate');
  const desc = villa.description[lang];
  const features = villa.features[lang];
  const descLabel = lang === 'fr' ? 'Description' : 'About this villa';
  const featLabel = lang === 'fr' ? 'Équipements' : 'Features';
  const specsLabel = lang === 'fr' ? 'Caractéristiques' : 'Specifications';
  const ctaText = lang === 'fr' ? 'Demander la disponibilité →' : 'Check availability →';

  const featureItems = features.map(f => `<div class="v-feature">${f}</div>`).join('');

  document.getElementById('v-info').innerHTML = `
    <div class="reveal">
      <p class="v-price-label">${priceLabel}</p>
      <p class="v-price" id="v-price" data-price-idr="${priceIdr}" data-price-suffix="${suffix}">${convertPrice(priceIdr, selectedCurrency)}${suffix}</p>
    </div>
    <div class="reveal">
      <p class="v-section-label">${specsLabel}</p>
      <div class="v-specs">
        <div class="v-spec-item">
          <p class="v-spec-label">${lang === 'fr' ? 'Chambres' : 'Bedrooms'}</p>
          <p class="v-spec-value">${villa.bedrooms}</p>
        </div>
        <div class="v-spec-item">
          <p class="v-spec-label">${lang === 'fr' ? 'Salles de bain' : 'Bathrooms'}</p>
          <p class="v-spec-value">${villa.bathrooms}</p>
        </div>
        <div class="v-spec-item">
          <p class="v-spec-label">${lang === 'fr' ? 'Terrain' : 'Land'}</p>
          <p class="v-spec-value">${villa.surface_land}</p>
        </div>
        <div class="v-spec-item">
          <p class="v-spec-label">${lang === 'fr' ? 'Surface bâtie' : 'Built area'}</p>
          <p class="v-spec-value">${villa.surface_build}</p>
        </div>
      </div>
    </div>
    <div class="reveal">
      <p class="v-section-label">${descLabel}</p>
      <p class="v-description">${desc}</p>
    </div>
    <div class="reveal">
      <p class="v-section-label">${featLabel}</p>
      <div class="v-features">${featureItems}</div>
    </div>
    <div class="reveal">
      <a href="contact.html?type=rental&villa=${id}" class="v-cta-btn">${ctaText}</a>
    </div>`;

  // Map
  document.getElementById('v-map-col').innerHTML = `
    <div class="v-map-wrap reveal">
      <p class="v-map-label">${lang === 'fr' ? 'Localisation' : 'Location'}</p>
      <iframe
        class="v-map-iframe"
        src="https://maps.google.com/maps?q=${villa.map.lat},${villa.map.lng}&z=15&output=embed"
        loading="lazy"
        title="${villa.name[lang]}"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
      <a href="contact.html?type=rental&villa=${id}" class="v-cta-btn">${ctaText}</a>
    </div>`;

  document.querySelectorAll('#v-detail .reveal').forEach(el => io.observe(el));
}

// ── INIT ──────────────────────────────────────────────────
async function init() {
  await initRates();
  updateCurrencyButtons();

  const id = new URLSearchParams(window.location.search).get('id');
  const loading = document.getElementById('v-loading');

  if (!id) {
    loading.innerHTML = '<p style="color:rgba(245,245,245,0.4);font-family:Outfit,sans-serif;font-size:13px">No villa selected. <a href="rentals.html" style="color:#C6A96B">Browse rentals →</a></p>';
    return;
  }

  try {
    const res = await fetch('data/villas.json');
    const villas = await res.json();
    const villa = villas[id];

    if (!villa) {
      loading.innerHTML = '<p style="color:rgba(245,245,245,0.4);font-family:Outfit,sans-serif;font-size:13px">Villa not found. <a href="rentals.html" style="color:#C6A96B">Browse rentals →</a></p>';
      return;
    }

    const lang = getLang();
    document.title = villa.name[lang] + ' — Sundara Investment Group';

    buildGallery(villa, lang);
    buildDetail(villa, id, lang);

    // Hide loading
    setTimeout(() => {
      loading.classList.add('hidden');
      setTimeout(() => loading.style.display = 'none', 500);
    }, 300);

  } catch (err) {
    loading.innerHTML = '<p style="color:rgba(245,245,245,0.4);font-family:Outfit,sans-serif;font-size:13px">Error loading villa. <a href="rentals.html" style="color:#C6A96B">Browse rentals →</a></p>';
  }
}

init();
</script>
</body>
</html>
